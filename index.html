let mainList=[...Array(words.length).keys()];
let blacklist=[];

let current=-1;
let score=0;
let total=0;

let reviewMode=false;
let waitingNext=false;
let listeningMode=false;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

shuffle(mainList);

function speakWord(){

    let utterance=
    new SpeechSynthesisUtterance(
        words[current][0]
    );

    utterance.lang="en-US";
    utterance.rate=0.9;

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
}

function toggleMode(){

    listeningMode=!listeningMode;

    document.getElementById("modeBtn").innerHTML=
    listeningMode
    ? "🎧 Listening Mode: ON"
    : "🎧 Listening Mode: OFF";

    nextQuestion();
}

function updateUI(){

    document.getElementById("score").innerHTML=
    `🏆 ${score}/${total}`;

    if(reviewMode){
        document.getElementById("progress").innerHTML=
        `📚 Blacklist còn ${blacklist.length} từ`;
    }else{
        document.getElementById("progress").innerHTML=
        `📖 Còn ${mainList.length} từ`;
    }
}

function nextQuestion(){

    if(!reviewMode){

        if(mainList.length===0){

            if(blacklist.length===0){
                finish();
                return;
            }

            reviewMode=true;
        }
    }

    if(reviewMode){

        if(blacklist.length===0){
            finish();
            return;
        }

        current=blacklist[0];

    }else{

        current=mainList[0];
    }

    if(listeningMode){

        document.getElementById("question").innerHTML=
        "🎧 Nhấn TAB để nghe";

    }else{

        document.getElementById("question").innerHTML=
        "👉 "+words[current][1];
    }

    document.getElementById("answer").value="";
    document.getElementById("result").innerHTML="";
    document.getElementById("nextBtn").style.display="none";

    waitingNext=false;

    updateUI();

    document.getElementById("answer").focus();
}

function finish(){

    document.getElementById("question").innerHTML=
    "🎉 Hoàn thành!";

    document.getElementById("answer").style.display="none";

    document.getElementById("nextBtn").style.display="none";
}

function checkAnswer(){

    if(waitingNext)return;

    let user=document
    .getElementById("answer")
    .value
    .trim()
    .toLowerCase();

    if(!user)return;

    total++;

    let correct=
    words[current][0]
    .toLowerCase();

    if(user===correct){

        score++;

        if(reviewMode){
            blacklist.shift();
        }else{
            mainList.shift();
        }

        document.getElementById("result").innerHTML=
        "✅ Chính xác";

        updateUI();

        setTimeout(nextQuestion,300);

    }else{

        if(!reviewMode &&
        !blacklist.includes(current)){
            blacklist.push(current);
        }

        waitingNext=true;

        document.getElementById("result").innerHTML=
        listeningMode
        ? `❌ Sai<br><br>
        Đáp án: <b>${words[current][0]}</b><br>
        Nghĩa: <b>${words[current][1]}</b>`
        : `❌ Sai<br><br>
        Đáp án: <b>${words[current][0]}</b>`;

        document.getElementById("nextBtn").style.display=
        "inline-block";
    }
}

function nextAfterWrong(){

    if(reviewMode){

        blacklist.push(
            blacklist.shift()
        );

    }else{

        mainList.push(
            mainList.shift()
        );
    }

    waitingNext=false;

    nextQuestion();
}

document
.getElementById("answer")
.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        if(waitingNext){

            nextAfterWrong();

        }

        else{

            checkAnswer();

        }

    }

    if(e.key==="Tab"){

        e.preventDefault();

        if(listeningMode){
            speakWord();
        }
    }
    if(e.key==="Control" && waitingNext){

        e.preventDefault();

        nextAfterWrong();

    }

});

nextQuestion();

</script>
